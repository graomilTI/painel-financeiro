<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Painel Corporativo</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="brand-eyebrow">Painel corporativo</div>
    <h1>Entrar no sistema</h1>
    <p>Use seu e-mail e senha cadastrados no Supabase Auth.</p>

    <form id="loginForm">
      <div class="field">
        <label for="email">E-mail</label>
        <input id="email" type="email" autocomplete="username" required />
      </div>

      <div class="field">
        <label for="password">Senha</label>
        <div class="password-wrap">
          <input id="password" type="password" autocomplete="current-password" required />
          <button type="button" id="togglePassword">Mostrar</button>
        </div>
      </div>

      <button class="btn btn-primary" type="submit">Entrar</button>
    </form>

    <div class="feedback" id="loginFeedback"></div>
  </div>

  <script type="module" src="./assets/js/login.js"></script>
</body>
</html>
